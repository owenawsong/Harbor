<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050a1a"/>
      <stop offset="100%" stop-color="#000308"/>
    </radialGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a7fff"/>
      <stop offset="60%" stop-color="#0055dd"/>
      <stop offset="100%" stop-color="#003aaa"/>
    </linearGradient>
    <linearGradient id="innerArcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0044cc"/>
      <stop offset="100%" stop-color="#0033aa"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Outer D arc (right-side crescent body) -->
  <path d="M 90 14
             C 125 10, 172 40, 178 80
             C 185 110, 178 145, 160 165
             C 140 188, 108 192, 90 188
             L 90 175
             C 115 175, 140 160, 155 140
             C 170 120, 172 95, 165 72
             C 157 48, 132 28, 90 28 Z"
        fill="url(#arcGrad)" clip-path="url(#circleClip)"/>

  <!-- Inner arc highlight (D crescent inner edge) -->
  <path d="M 90 30
             C 128 30, 152 52, 160 75
             C 168 98, 164 128, 148 148
             C 133 165, 110 173, 90 173
             L 90 152
             C 108 150, 126 140, 136 122
             C 148 102, 146 75, 132 58
             C 118 42, 100 36, 90 36 Z"
        fill="url(#innerArcGrad)" clip-path="url(#circleClip)"/>

  <!-- Lighthouse silhouette -->
  <!-- Base platform -->
  <rect x="52" y="152" width="56" height="8" rx="2" fill="#0a1e5e"/>
  <!-- Lighthouse body (tapered tower) -->
  <path d="M 68 152 L 62 80 L 98 80 L 92 152 Z" fill="#0d2470"/>
  <!-- Upper section (lighter colored band) -->
  <rect x="63" y="100" width="34" height="10" rx="1" fill="#0a1e5e"/>
  <!-- Light room (top box) -->
  <rect x="62" y="68" width="36" height="16" rx="2" fill="#0d2470"/>
  <!-- Lantern / light top -->
  <path d="M 60 68 L 80 52 L 100 68 Z" fill="#0d2470"/>
  <!-- Light beam (diagonal rays going left) -->
  <path d="M 62 62 L 18 38" stroke="#1a6aee" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <path d="M 62 66 L 14 58" stroke="#1a6aee" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 62 70 L 18 82" stroke="#1a6aee" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Circuit nodes (right side, inside the D arc) -->
  <!-- Node lines -->
  <line x1="140" y1="85" x2="162" y2="85" stroke="#2288ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="100" x2="165" y2="100" stroke="#2288ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="115" x2="162" y2="115" stroke="#2288ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Node circles (filled) -->
  <circle cx="163" cy="85" r="6" fill="none" stroke="#2288ff" stroke-width="2.5"/>
  <circle cx="166" cy="100" r="6" fill="none" stroke="#2288ff" stroke-width="2.5"/>
  <circle cx="163" cy="115" r="6" fill="none" stroke="#2288ff" stroke-width="2.5"/>

  <!-- Outer ring border -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#0a2060" stroke-width="4"/>
</svg>
